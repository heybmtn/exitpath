<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exit Path</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#fff;
    color:#000;
    font-family:Georgia, serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
}

.container{
    width:min(900px,90vw);
    margin:auto;
}

/* ------------------
   HEADER
------------------- */

.hero{
    padding:40px 0 60px;
}

.logo{
    font-size:.75rem;
    letter-spacing:.35em;
    text-transform:uppercase;
    margin-bottom:48px;
}

h1{
    font-size:clamp(3.5rem,11vw,8rem);
    line-height:.88;
    font-weight:400;
    letter-spacing:-0.05em;
    max-width:8ch;
}

/* ------------------
   PATH
------------------- */

.path{
    position:relative;
    padding-left:80px;
}

.path::before{
    content:"";
    position:absolute;
    left:26px;
    top:0;
    bottom:0;
    width:2px;

    background:
    repeating-linear-gradient(
        to bottom,
        #000 0px,
        #000 8px,
        transparent 8px,
        transparent 20px
    );

    animation:pathMove 14s linear infinite;
}

@keyframes pathMove{
    from{
        background-position:0 0;
    }
    to{
        background-position:0 220px;
    }
}

/* ------------------
   FOOTPRINTS
------------------- */

.foot{
    position:absolute;
    left:-66px;
    top:0;
    width:44px;
    height:44px;
    animation:step 3s ease-in-out infinite;
}

.foot::before,
.foot::after{
    content:"";
    position:absolute;
    width:12px;
    height:24px;
    background:#000;
    border-radius:999px;
}

.foot::before{
    left:8px;
    transform:rotate(-18deg);
}

.foot::after{
    right:8px;
    top:12px;
    transform:rotate(18deg);
}

@keyframes step{
    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-4px);
    }
}

/* ------------------
   WAYPOINTS
------------------- */

.waypoint{
    position:relative;
    padding:110px 0;
}

.waypoint a{
    color:#000;
    text-decoration:none;
    display:block;
    transition:.25s ease;
}

.waypoint a:hover{
    transform:translateX(12px);
}

.num{
    font-size:.75rem;
    letter-spacing:.15em;
    text-transform:uppercase;
    margin-bottom:14px;
}

.waypoint h2{
    font-size:clamp(2.6rem,8vw,5rem);
    line-height:.92;
    font-weight:400;
    letter-spacing:-0.04em;
    max-width:10ch;
}

.arrow{
    margin-top:20px;
    font-size:2rem;
}

/* ------------------
   DESTINATION
------------------- */

.destination{
    position:relative;
    padding:140px 0 100px;
}

.destination .foot{
    animation:none;
}

.door{
    font-size:4rem;
    line-height:1;
}

.end{
    margin-top:20px;
    font-size:.75rem;
    letter-spacing:.25em;
    text-transform:uppercase;
}

/* ------------------
   DESKTOP
------------------- */

@media(min-width:900px){

    .container{
        width:min(1100px,88vw);
    }

    .path{
        padding-left:180px;
    }

    .path::before{
        left:80px;
    }

    .foot{
        left:-120px;
    }

    .waypoint{
        padding:140px 0;
    }

    .waypoint h2{
        font-size:clamp(4rem,6vw,6rem);
    }
}

</style>
</head>
<body>

<div class="container">

<section class="hero">

    <div class="logo">
        EXIT PATH
    </div>

    <h1>
        THERE HAS TO BE
        ANOTHER WAY.
    </h1>

</section>

<section class="path">

    <div class="waypoint">

        <div class="foot"></div>

        <a href="/freedom-number">

            <div class="num">
                01
            </div>

            <h2>
                WHAT'S YOUR
                FREEDOM NUMBER?
            </h2>

            <div class="arrow">
                →
            </div>

        </a>

    </div>

    <div class="waypoint">

        <div class="foot"></div>

        <a href="/idea-finder">

            <div class="num">
                02
            </div>

            <h2>
                EVERYONE HAS
                SALEABLE
                KNOWLEDGE.
            </h2>

            <div class="arrow">
                →
            </div>

        </a>

    </div>

    <div class="waypoint">

        <div class="foot"></div>

        <a href="/exit-path">

            <div class="num">
                03
            </div>

            <h2>
                BUILD YOUR
                EXIT PATH.
            </h2>

            <div class="arrow">
                →
            </div>

        </a>

    </div>

    <div class="waypoint">

        <div class="foot"></div>

        <a href="/stories">

            <div class="num">
                04
            </div>

            <h2>
                STORIES FROM
                PEOPLE
                WALKING IT.
            </h2>

            <div class="arrow">
                →
            </div>

        </a>

    </div>

    <div class="destination">

        <div class="foot"></div>

        <div class="door">
            ▯
        </div>

        <div class="end">
            FIND YOUR EXIT
        </div>

    </div>

</section>

</div>

</body>
</html>
