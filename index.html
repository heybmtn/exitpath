<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="description" content="Exit Path — there has to be another way. Find your freedom number, the leverage you already have, and build your exit.">
<title>Exit Path</title>

<style>
/* =========================================================
   DESIGN TOKENS
   ========================================================= */
:root{
    --ink:#000;
    --paper:#fff;
    --accent:#6366f1;

    /* Page rhythm */
    --content:min(1100px, 88vw);
    --step-gap:clamp(72px, 13vw, 130px);   /* vertical breathing room per waypoint */

    /* The path / footprints */
    --gutter:clamp(72px, 14vw, 180px);     /* left inset that holds the trail */
    --line-x:clamp(26px, 5.5vw, 80px);     /* horizontal centre of the dashed line */
    --foot:clamp(32px, 7vw, 50px);         /* footprint width (height follows ratio) */
    --dash-period:20px;                    /* one on+off segment of the dashed trail */

    --type-display:Georgia, "Times New Roman", serif;
}

/* =========================================================
   RESET
   ========================================================= */
*,
*::before,
*::after{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
    -webkit-text-size-adjust:100%;
}

body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--type-display);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overflow-x:hidden;
    padding-bottom:env(safe-area-inset-bottom, 0px);
}

ol{list-style:none;}

a{
    color:inherit;
    text-decoration:none;
    -webkit-tap-highlight-color:transparent;
}

svg{display:block;}

.container{
    width:var(--content);
    margin-inline:auto;
    padding-inline:max(0px, env(safe-area-inset-left, 0px));
}

/* =========================================================
   HERO
   ========================================================= */
.hero{
    padding:clamp(32px, 8vw, 56px) 0 clamp(48px, 10vw, 72px);
}

.logo{
    font-size:.75rem;
    letter-spacing:.35em;
    text-transform:uppercase;
    margin-bottom:clamp(36px, 8vw, 56px);
}

h1{
    font-size:clamp(3.25rem, 11vw, 8rem);
    line-height:.88;
    font-weight:400;
    letter-spacing:-0.05em;
    max-width:8ch;
    text-wrap:balance;
}

/* =========================================================
   THE PATH (dashed trail down the left gutter)
   ========================================================= */
.path{
    position:relative;
}

.path::before{
    content:"";
    position:absolute;
    left:var(--line-x);
    top:0;
    bottom:0;
    width:2px;
    transform:translateX(-50%);

    background:repeating-linear-gradient(
        to bottom,
        var(--ink) 0,
        var(--ink) 8px,
        transparent 8px,
        transparent var(--dash-period)
    );

    animation:trail-flow 16s linear infinite;
}

@keyframes trail-flow{
    to{ background-position:0 240px; }   /* 12 dash periods → seamless loop */
}

/* =========================================================
   FOOTPRINTS
   ========================================================= */
.foot{
    position:absolute;
    top:calc(var(--step-gap) - var(--foot) * 0.55);
    left:calc(var(--line-x) - (var(--foot) / 2) + var(--foot-shift, 0px));
    width:var(--foot);
    will-change:transform;
    animation:step 3s ease-in-out infinite;
}

.foot svg{
    width:100%;
    height:auto;
    fill:var(--ink);
    transform-origin:center;
}

/* Alternate left / right prints so it reads as walking */
.foot--left{ --foot-shift:-5px; }
.foot--left svg{ transform:rotate(-8deg); }

.foot--right{ --foot-shift:5px; }
.foot--right svg{ transform:scaleX(-1) rotate(-8deg); }

/* Stagger the bob so the steps cascade down the trail */
.waypoint:nth-of-type(1) .foot{ animation-delay:0s; }
.waypoint:nth-of-type(2) .foot{ animation-delay:.4s; }
.waypoint:nth-of-type(3) .foot{ animation-delay:.8s; }
.waypoint:nth-of-type(4) .foot{ animation-delay:1.2s; }

@keyframes step{
    0%, 100%{ transform:translateY(0); }
    45%     { transform:translateY(-4px); }
}

/* =========================================================
   WAYPOINTS
   ========================================================= */
.waypoint{
    position:relative;
    padding:var(--step-gap) 0 var(--step-gap) var(--gutter);
}

.waypoint a{
    display:block;
    width:fit-content;
    transition:transform .25s ease;
}

.waypoint a:hover{ transform:translateX(12px); }
.waypoint a:hover h2{ color:var(--accent); }

.waypoint a:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:10px;
}

.num{
    font-size:.75rem;
    letter-spacing:.15em;
    text-transform:uppercase;
    margin-bottom:14px;
    color:var(--accent);
}

.waypoint h2{
    font-size:clamp(2.4rem, 8vw, 6rem);
    line-height:.92;
    font-weight:400;
    letter-spacing:-0.04em;
    max-width:11ch;
    text-wrap:balance;
}

.arrow{
    margin-top:20px;
    font-size:2rem;
    line-height:1;
    color:var(--accent);
}

.label{
    display:block;
    margin-top:16px;
    font-size:.75rem;
    letter-spacing:.25em;
    text-transform:uppercase;
}

/* Members-only join cue */
.unlock{
    display:block;
    margin-top:20px;
    font-size:.75rem;
    letter-spacing:.18em;
    text-transform:uppercase;
    font-weight:700;
    color:var(--accent);
}
.unlock span{ font-size:1.4em; line-height:1; vertical-align:-2px; }

/* Linkless waypoint (temporarily disabled) */
.waypoint-static{ display:block; width:fit-content; }
.soon{
    display:block;
    margin-top:20px;
    font-size:.75rem;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:#9a9a9a;
}

/* =========================================================
   DESTINATION
   ========================================================= */
.destination{
    position:relative;
    padding:clamp(96px, 18vw, 150px) 0 clamp(80px, 14vw, 110px) var(--gutter);
}

/* The arrival print is planted — no walking bob */
.destination .foot{
    top:clamp(40px, 8vw, 70px);
    animation:none;
}

.door{
    width:clamp(46px, 9vw, 64px);
    height:auto;
    fill:none;
    stroke:var(--ink);
    stroke-width:5;
}

.end{
    margin-top:22px;
    font-size:.75rem;
    letter-spacing:.25em;
    text-transform:uppercase;
}

/* =========================================================
   DESKTOP REFINEMENTS
   ========================================================= */
@media (min-width:900px){
    .waypoint h2{ font-size:clamp(4rem, 6vw, 6rem); }
}

/* =========================================================
   MOTION PREFERENCES
   ========================================================= */
@media (prefers-reduced-motion:reduce){
    html{ scroll-behavior:auto; }
    .path::before,
    .foot{ animation:none; }
}
</style>
</head>
<body>

<!-- Reusable footprint glyph (defined once, referenced via <use>) -->
<svg width="0" height="0" aria-hidden="true" focusable="false" style="position:absolute">
    <symbol id="footprint" viewBox="0 0 60 96">
        <path d="M30 6 C40 6 46 13 46 24 C46 33 48 40 48 50 C48 60 43 66 30 66
                 C17 66 14 60 14 51 C14 44 19 41 20 35 C21 29 14 27 14 20
                 C14 11 20 6 30 6 Z"/>
        <ellipse cx="16.5" cy="73" rx="5"   ry="5.6"/>
        <ellipse cx="27"   cy="77" rx="4.2" ry="4.6"/>
        <ellipse cx="36.5" cy="77" rx="3.8" ry="4.2"/>
        <ellipse cx="44.5" cy="73" rx="3.2" ry="3.6"/>
        <ellipse cx="51"   cy="67" rx="2.6" ry="2.9"/>
    </symbol>
</svg>

<div class="container">

    <header class="hero">
        <p class="logo">Exit Path</p>
        <h1>There has to be another way.</h1>
    </header>

    <nav class="path" aria-label="Explore Exit Path">
        <ol>

            <li class="waypoint">
                <span class="foot foot--left" aria-hidden="true">
                    <svg viewBox="0 0 60 96"><use href="#footprint"/></svg>
                </span>
                <a href="/freedom-number">
                    <span class="num">01</span>
                    <h2>What&rsquo;s your freedom number?</h2>
                    <span class="arrow" aria-hidden="true">&rarr;</span>
                </a>
            </li>

            <li class="waypoint">
                <span class="foot foot--right" aria-hidden="true">
                    <svg viewBox="0 0 60 96"><use href="#footprint"/></svg>
                </span>
                <a href="exit-path-questionnaire.html">
                    <span class="num">02</span>
                    <h2>Find your exit.</h2>
                    <span class="label">Exit Path Discover</span>
                    <span class="unlock">Start the questionnaire <span aria-hidden="true">&rarr;</span></span>
                </a>
            </li>

            <li class="waypoint">
                <span class="foot foot--left" aria-hidden="true">
                    <svg viewBox="0 0 60 96"><use href="#footprint"/></svg>
                </span>
                <div class="waypoint-static">
                    <span class="num">03</span>
                    <h2>Build your exit path.</h2>
                    <span class="label">Exit Path Build</span>
                    <span class="soon">Coming soon</span>
                </div>
            </li>

            <li class="waypoint">
                <span class="foot foot--right" aria-hidden="true">
                    <svg viewBox="0 0 60 96"><use href="#footprint"/></svg>
                </span>
                <a href="/stories">
                    <span class="num">04</span>
                    <h2>Stories from people walking it.</h2>
                    <span class="arrow" aria-hidden="true">&rarr;</span>
                </a>
            </li>

        </ol>

        <div class="destination">
            <span class="foot foot--left" aria-hidden="true">
                <svg viewBox="0 0 60 96"><use href="#footprint"/></svg>
            </span>

            <!-- Doorway -->
            <svg class="door" viewBox="0 0 40 64" aria-hidden="true">
                <rect x="2.5" y="2.5" width="35" height="59" rx="3"/>
                <circle cx="30" cy="33" r="2.4" fill="var(--accent)" stroke="none"/>
            </svg>
        </div>
    </nav>

</div>

</body>
</html>
